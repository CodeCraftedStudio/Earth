<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Earth Visualizer | Pure Planet View</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Arial', sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            padding: 12px 20px;
            border-radius: 12px;
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            font-weight: 500;
            border-left: 4px solid #66ccff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            font-family: monospace;
        }
        #info h1 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
        #info p {
            margin: 5px 0 0;
            font-size: 0.75rem;
            opacity: 0.85;
        }
        #controls-note {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.8);
            background: rgba(0,0,0,0.5);
            padding: 6px 14px;
            border-radius: 24px;
            font-size: 12px;
            pointer-events: none;
            backdrop-filter: blur(4px);
            font-family: monospace;
        }
        @media (max-width: 600px) {
            #info { top: 12px; left: 12px; padding: 8px 14px; }
            #info h1 { font-size: 1rem; }
            #controls-note { font-size: 9px; bottom: 12px; left: 12px; }
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>EARTH VISUALIZER</h1>
        <p>Realistic textures | Atmospheric glow | Starfield | Bloom effect</p>
    </div>
    <div id="controls-note">
        🖱️ Drag to rotate | Right-click to pan | Scroll to zoom
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- setup scene, camera, renderer ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010118);
        scene.fog = new THREE.FogExp2(0x010118, 0.0002);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0.2, 3.5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- Post-processing: Bloom for realistic highlights ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.85, 0.35, 0.2);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.65;
        bloomPass.radius = 0.5;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);

        // --- Orbit controls with smooth damping ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 0.8;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.6;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.autoRotate = false;
        controls.target.set(0, 0, 0);

        // --- Advanced Lighting System ---
        const ambientLight = new THREE.AmbientLight(0x404060, 0.55);
        scene.add(ambientLight);
        
        const hemiLight = new THREE.HemisphereLight(0x88bbff, 0x332211, 0.65);
        scene.add(hemiLight);
        
        // Main directional light (sun)
        const sunLight = new THREE.DirectionalLight(0xfff5d0, 1.4);
        sunLight.position.set(6, 8, 4);
        sunLight.castShadow = true;
        sunLight.receiveShadow = false;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 10;
        sunLight.shadow.camera.left = -5;
        sunLight.shadow.camera.right = 5;
        sunLight.shadow.camera.top = 5;
        sunLight.shadow.camera.bottom = -5;
        scene.add(sunLight);
        
        // Fill light from below
        const fillLight = new THREE.PointLight(0x4466aa, 0.5);
        fillLight.position.set(0, -2, 0);
        scene.add(fillLight);
        
        // Back rim light
        const rimLight = new THREE.PointLight(0xffaa66, 0.6);
        rimLight.position.set(-2, 1.5, -3);
        scene.add(rimLight);
        
        // Accent light
        const accentLight = new THREE.PointLight(0x88aaff, 0.45);
        accentLight.position.set(1, 1.2, 2);
        scene.add(accentLight);

        // --- Starfield (two layers for depth) ---
        const starCount = 3500;
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            const r = 450 + Math.random() * 200;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
            starPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            starPos[i*3+2] = r * Math.cos(phi);
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.22, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);
        
        const starGeo2 = new THREE.BufferGeometry();
        const starPos2 = new Float32Array(2000 * 3);
        for (let i = 0; i < 2000; i++) {
            starPos2[i*3] = (Math.random() - 0.5) * 900;
            starPos2[i*3+1] = (Math.random() - 0.5) * 700;
            starPos2[i*3+2] = (Math.random() - 0.5) * 600 - 200;
        }
        starGeo2.setAttribute('position', new THREE.BufferAttribute(starPos2, 3));
        const starMat2 = new THREE.PointsMaterial({ color: 0xaaccff, size: 0.13, transparent: true, opacity: 0.6 });
        const stars2 = new THREE.Points(starGeo2, starMat2);
        scene.add(stars2);

        // --- Earth with high-res textures and night lights ---
        const earthRadius = 1.0;
        const earthGeometry = new THREE.SphereGeometry(earthRadius, 256, 256);
        
        const textureLoader = new THREE.TextureLoader();
        const earthMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
        const earthSpecularMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');
        const earthNormalMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg');
        const cloudMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png');
        const nightMap = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_nightmap_2048.jpg');
        
        const earthMaterial = new THREE.MeshPhongMaterial({
            map: earthMap,
            specularMap: earthSpecularMap,
            specular: new THREE.Color('grey'),
            shininess: 7,
            normalMap: earthNormalMap,
            normalScale: new THREE.Vector2(0.9, 0.9),
            emissiveMap: nightMap,
            emissive: new THREE.Color(0x224466),
            emissiveIntensity: 0.35
        });
        
        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        earth.castShadow = true;
        earth.receiveShadow = false;
        scene.add(earth);
        
        // Cloud layer
        const cloudGeometry = new THREE.SphereGeometry(earthRadius + 0.01, 256, 256);
        const cloudMaterial = new THREE.MeshPhongMaterial({
            map: cloudMap,
            transparent: true,
            opacity: 0.12,
            blending: THREE.AdditiveBlending
        });
        const clouds = new THREE.Mesh(cloudGeometry, cloudMaterial);
        scene.add(clouds);
        
        // Atmospheric glow (fresnel effect)
        const atmosphereGeometry = new THREE.SphereGeometry(earthRadius + 0.025, 64, 64);
        const atmosphereMaterial = new THREE.ShaderMaterial({
            uniforms: {
                glowColor: { value: new THREE.Color(0x88aaff) },
                intensity: { value: 0.25 }
            },
            vertexShader: `
                varying vec3 vNormal;
                void main() {
                    vNormal = normalize(normal);
                    gl_PointSize = 1.0;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform vec3 glowColor;
                uniform float intensity;
                varying vec3 vNormal;
                void main() {
                    float brightness = pow(0.7 - abs(vNormal.y), 1.5);
                    float alpha = brightness * intensity * 0.6;
                    gl_FragColor = vec4(glowColor, alpha);
                }
            `,
            transparent: true,
            side: THREE.BackSide
        });
        const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
        scene.add(atmosphere);
        
        // --- Subtle atmospheric dust particles ---
        const dustCount = 1500;
        const dustGeo = new THREE.BufferGeometry();
        const dustPos = [];
        for (let i = 0; i < dustCount; i++) {
            const rad = 1.05 + Math.random() * 0.2;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            dustPos.push(rad * Math.sin(phi) * Math.cos(theta));
            dustPos.push(rad * Math.sin(phi) * Math.sin(theta));
            dustPos.push(rad * Math.cos(phi));
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(dustPos), 3));
        const dustMat = new THREE.PointsMaterial({ color: 0xaaddff, size: 0.0025, transparent: true, opacity: 0.2 });
        const dustParticles = new THREE.Points(dustGeo, dustMat);
        scene.add(dustParticles);
        
        // --- Simple reference grid (very subtle) ---
        const gridHelper = new THREE.GridHelper(5, 20, 0x88aaff, 0x336699);
        gridHelper.position.y = -1.7;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.08;
        scene.add(gridHelper);
        
        // --- Animation loop (cloud rotation, star rotation, dynamic lighting) ---
        let lastTime = performance.now();
        
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            if (delta <= 0) delta = 0.016;
            lastTime = now;
            
            // Rotate clouds for subtle motion
            clouds.rotation.y += 0.0007;
            
            // Slowly rotate stars for ambiance
            stars.rotation.y += 0.00008;
            stars2.rotation.x += 0.00004;
            
            // Dynamic lighting pulsation (gentle)
            const time = now * 0.002;
            accentLight.intensity = 0.5 + Math.sin(time) * 0.1;
            rimLight.intensity = 0.65 + Math.sin(time * 1.3) * 0.08;
            
            // Update controls and render via EffectComposer
            controls.update();
            effectComposer.render();
            
            requestAnimationFrame(animate);
        }
        
        // Resize handler
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        }
        
        animate();
        console.log('Earth Visualizer Started | Clean planet view with bloom and atmosphere');
    </script>
</body>
</html>
